name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(date -u +%Y-%m-%d)"
          # Append suffix if tag already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            TAG="${TAG}-$(date -u +%H%M%S)"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Auto-released on ${TAG}" \
            --latest \
            *.json
