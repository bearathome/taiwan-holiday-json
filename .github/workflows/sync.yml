name: Sync Taiwan Holidays

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch
        uses: actions/checkout@v4
        with:
          ref: sync
          path: sync

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and run sync
        working-directory: sync
        run: |
          npm ci
          node sync.js

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Copy results to main
        run: |
          cp sync/result/*.json main/
          cp sync/result/feed.* main/

      - name: Commit and push to main
        working-directory: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json feed.*
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update holiday data $(date -u +%Y-%m-%d)"
            git push
          fi
